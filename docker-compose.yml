version: '3.8'

services:
  agent:
    build: .
    network_mode: "host" # Allows connecting to localhost:11434 for Ollama
    volumes:
      - .:/app # Mount the project directory so knowledge base and code updates reflect
    environment:
      - OLLAMA_HOST=http://localhost:11434
    stdin_open: true # Allows interaction via terminal
    tty: true
